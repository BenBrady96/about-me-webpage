<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Ben Brady - Software Engineer, Business Analyst & AI Integrator. Portfolio showcasing automation, AI integration, and full-stack projects." />
  <meta name="author" content="Ben Brady" />
  <meta property="og:title" content="Ben Brady's Portfolio" />
  <meta property="og:description"
    content="Software Engineer, Business Analyst & AI Integrator. Explore my projects in automation, AI, and full-stack development." />
  <meta property="og:type" content="website" />
  <link id="favicon" rel="icon" type="image/png" href="https://avatars.githubusercontent.com/BenBrady96" />
  <script>
    (function () {
      var link = document.getElementById('favicon');
      var avatarUrl = 'https://avatars.githubusercontent.com/BenBrady96';
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function () {
        try {
          var size = 64;
          var canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          var ctx = canvas.getContext('2d');
          ctx.beginPath();
          ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, 0, 0, size, size);
          link.href = canvas.toDataURL('image/png');
        } catch (e) {
          link.href = avatarUrl;
        }
      };
      img.onerror = function () {
        link.href = avatarUrl;
      };
      img.src = avatarUrl;
    })();
  </script>
  <title>Ben Brady's Portfolio</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
